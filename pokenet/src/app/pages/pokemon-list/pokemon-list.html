<div class="list-container">
    <header class="app-header">
        <div class="logo">
            <span class="pokeball-icon">🔴</span>
            <h1>Pokenet Explorer</h1>
        </div>
        <p class="subtitle">Discover the world of Pokémon</p>
        
        <div class="search-container">
            <input type="text" placeholder="Search Pokémon..." (input)="onSearch($event)" class="search-input">
        </div>
    </header>


    <div class="pokemon-grid">
        @for (pokemon of filteredPokemons(); track pokemon.id) {
        <app-pokemon-card [pokemon]="pokemon"></app-pokemon-card>
        }
    </div>
</div>
